- title: Diffusion Map for Manifold Learning, Theory and Implementation
  publishedIn:
    name: KDNuggets
    date: 14 March 2020
    url: https://www.kdnuggets.com/
  authors:
  - name: Rahul Raj
    url: https://randomwalk.in
  paper:
    summary: ‘Curse of dimensionality’ is a well-known problem in Data Science, which often causes poor performance, inaccurate results, and, most importantly, a similarity measure break-down. The primary cause of this is because high dimensional datasets are typically sparse, and often a lower-dimensional structure or ‘Manifold’ would embed this data. So there is a non-linear relationship among the variables (or features or dimensions), which we need to learn to compute better similarity.
    url: https://www.kdnuggets.com/2020/03/diffusion-map-manifold-learning-theory-implementation.html
  categories: ["image-processing"]
  tags: ["Image Processing", "Computer Vision"]

